# DiffLOB 配置
model:
  type: conditional_diffusion
  lob_dim: 22  # 10 bid + 10 ask + spread + imbalance
  condition_dim: 4  # price_dir, volatility, volume, imbalance
  n_diffusion_steps: 50
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 0.02

denoiser:
  type: conditional_mlp
  hidden_dim: 128
  n_layers: 3
  activation: relu
  condition_embed_dim: 64

training:
  n_epochs: 500
  batch_size: 64
  lr: 0.001
  ema_decay: 0.999

evaluation:
  statistical_fidelity:
    metrics: [wasserstein, covariance_distance, correlation_diff]
  causal_consistency:
    interventions: [price_drop, volatility_spike, imbalance_shift]
  prediction_enhancement:
    downstream_task: price_direction
    train_test_split: 0.7

stress_test:
  scenarios:
    - name: flash_crash
      condition: [-0.8, 0.9, 0.8, -0.6]
      n_samples: 200
    - name: liquidity_crisis
      condition: [0.0, 0.95, 0.1, 0.0]
      n_samples: 200
    - name: large_buy_order
      condition: [0.3, 0.4, 0.9, 0.7]
      n_samples: 200
