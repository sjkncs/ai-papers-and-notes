# TTA-Finance 配置
model:
  type: mlp_with_batchnorm
  input_dim: 30  # lookback * 3 (mean, std, momentum)
  hidden_dim: 64
  n_layers: 3
  output_dim: 10  # n_assets

tta:
  method: stats_only  # none / stats_only / entropy_min / ema_teacher / full_adapt
  ema_decay: 0.99
  perturbation_scale: 0.01
  lr_gamma: 0.001

regime_detector:
  window: 20
  threshold: 2.0  # z-score threshold for regime switch detection

training:
  n_epochs: 50
  batch_size: 32
  lr: 0.001
  pretrain_days: 500

evaluation:
  methods: [none, stats_only, ema_teacher, entropy_min, full_adapt]
  metrics: [mse, direction_accuracy, regime_detection]
  test_start: 500

data:
  n_days: 1000
  n_assets: 10
  lookback: 20
  regime_switch_prob: 0.02
