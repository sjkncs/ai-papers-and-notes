# Regret Portfolio 配置
portfolio:
  n_assets: 20
  initial_capital: 1000000
  transaction_cost: 0.001
  max_single_weight: 0.3

clustering:
  method: semantic  # semantic / correlation / industry
  n_clusters: 5
  update_frequency: 60  # trading days

regret_minimizer:
  learning_rate: 0.01
  risk_aversion: 2.0
  rebalance_freq: 20
  max_drawdown_constraint: 0.15

sentiment:
  window: 20
  extreme_threshold: 0.6
  momentum_weight: 0.3
  risk_adjustment: true

backtest:
  start_date: 2015-01-01
  end_date: 2025-01-01
  benchmark: SPY
  n_simulations: 100

llm:
  model: gpt-4o
  embed_dim: 64
  sentiment_update_freq: daily
