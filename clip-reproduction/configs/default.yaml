# ============================================================
# CLIP 默认训练配置 / CLIP Default Training Configuration
# ============================================================
# 参考论文 / Reference: "Learning Transferable Visual Models
#   From Natural Language Supervision" (Radford et al., 2021)
# ============================================================

# -- 模型架构 / Model Architecture --
model:
  image_size: 224           # 输入图像尺寸 / Input image size (pixels)
  patch_size: 16            # ViT patch大小 / ViT patch size
  embed_dim: 512            # 编码器隐藏维度 / Encoder hidden dimension
  projection_dim: 256       # 投影头输出维度 / Projection head output dimension
  num_heads: 8              # 多头注意力头数 / Number of attention heads
  image_depth: 6            # 图像编码器Transformer层数 / Image encoder depth
  text_depth: 6             # 文本编码器Transformer层数 / Text encoder depth
  vocab_size: 49408         # 词表大小 / Vocabulary size (BPE)
  max_seq_len: 77           # 最大文本序列长度 / Max text sequence length
  mlp_ratio: 4.0            # MLP隐藏层倍率 / MLP hidden dim ratio

# -- 训练超参数 / Training Hyperparameters --
training:
  batch_size: 256           # 每GPU批次大小 / Per-GPU batch size
  learning_rate: 3.0e-4     # 初始学习率 / Initial learning rate
  weight_decay: 0.01        # 权重衰减 / Weight decay (AdamW)
  warmup_steps: 2000        # 线性预热步数 / Linear warmup steps
  max_steps: 100000         # 最大训练步数 / Maximum training steps
  temperature_init: 0.07    # 温度参数初始值 / Initial temperature (tau)
  temperature_max: 100.0    # 温度参数上限 / Temperature clamp upper bound
  grad_clip_norm: 1.0       # 梯度裁剪范数 / Gradient clipping max norm
  log_every: 50             # 每隔N步记录日志 / Log every N steps
  save_every: 5000          # 每隔N步保存检查点 / Save checkpoint every N steps

# -- 数据配置 / Data Configuration --
data:
  dataset_type: "coco"      # 数据集类型 / Dataset type: coco | custom
  data_root: "./data"       # 数据根目录 / Data root directory
  ann_file: "./data/annotations.json"  # 标注文件路径 / Annotation file path
  num_workers: 4            # DataLoader工作线程 / DataLoader workers
  image_mean: [0.48145466, 0.4578275, 0.40821073]   # 图像归一化均值 / Image normalization mean
  image_std:  [0.26862954, 0.26130258, 0.27577711]   # 图像归一化标准差 / Image normalization std

# -- 评估配置 / Evaluation Configuration --
evaluation:
  eval_every: 5000          # 每隔N步评估 / Evaluate every N steps
  zero_shot_labels: "imagenet"  # 零样本标签集 / Zero-shot label set
  retrieval_k: [1, 5, 10]   # 检索Recall@K / Retrieval Recall@K values

# -- 检查点与输出 / Checkpoint & Output --
output:
  checkpoint_dir: "./checkpoints"  # 检查点保存目录 / Checkpoint directory
  log_dir: "./logs"                # 日志目录 / Log directory
  experiment_name: "clip_default"  # 实验名称 / Experiment name
